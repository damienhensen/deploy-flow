services:
  backend:
    image: cosmtrek/air:latest
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "80:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - mysql

  migrate:
    image: golang:1.26-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        go install github.com/pressly/goose/v3/cmd/goose@latest &&
        $(go env GOPATH)/bin/goose -dir migrations mysql 'deployflow:deployflow@tcp(mysql:3306)/deployflow?parseTime=true' up
      "
    depends_on:
      - mysql

  mysql:
    image: mysql:9.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: deployflow
      MYSQL_USER: deployflow
      MYSQL_PASSWORD: deployflow
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
